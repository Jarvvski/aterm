name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build-and-test:
    name: fmt / clippy / check / test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets

      - name: Check
        run: cargo check --workspace

      - name: Test
        run: cargo test --workspace

  bench:
    name: bench (non-blocking)
    runs-on: macos-14
    continue-on-error: true
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build benches
        run: cargo build -p aterm-bench --benches

      # Placeholder: a full `cargo bench` run is left non-blocking and is not
      # executed in CI yet (no perf baseline to gate against). TODO(EPIC-7).
      - name: Bench (smoke)
        run: cargo bench -p aterm-bench -- --test
