<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>aterm - vision mock (static preview)</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font-family: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, "Cascadia Mono", monospace;
    -webkit-font-smoothing: antialiased;
    background: var(--desk); color: var(--ink);
    min-height: 100vh; padding: 56px 48px 100px;
  }

  /* gallery / page theme (from aterm.dc.html) */
  #page[data-theme="dark"]  { --desk:#100e0a; --ink:#ece6d8; --ink-dim:#9a9382; --ink-faint:#5e584b; --accent:#3d88cc; }
  #page[data-theme="light"] { --desk:#e6e0d2; --ink:#26231b; --ink-dim:#6c6555; --ink-faint:#a89f8c; --accent:#2f7dc2; }

  /* window/component theme (from AtermWindow.dc.html) */
  .aw[data-theme="dark"] {
    --bg:#1b1915; --bg-elev:#221f19;
    --ink:#ece6d8; --ink-dim:#9a9382; --ink-faint:#5e584b;
    --hairline: rgba(236,230,216,0.085);
    --accent:#3d88cc; --agent:#9d86d6; --warn:#d59a4a; --warn-bg: rgba(213,154,74,0.09);
    --err:#d47257; --ok:#82ac79;
  }
  .aw[data-theme="light"] {
    --bg:#faf7ef; --bg-elev:#f2ede1;
    --ink:#26231b; --ink-dim:#6c6555; --ink-faint:#a89f8c;
    --hairline: rgba(38,35,27,0.10);
    --accent:#2f7dc2; --agent:#7458bd; --warn:#b57d2c; --warn-bg: rgba(181,125,44,0.08);
    --err:#bf5a40; --ok:#5c8a56;
  }
  .aw [data-mode="shell"] { --mode: var(--accent); }
  .aw [data-mode="agent"] { --mode: var(--agent); }
  .aw, .aw * { font-family: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, "Cascadia Mono", monospace; }

  /* In the live mock, block-meta is hover-revealed; in this static preview we keep it
     visible so exit status reads at a glance in a screenshot, but still lift on hover. */
  .aw .block-meta { opacity:.75; transition: opacity .18s ease; }
  .aw .block:hover .block-meta { opacity:1; }
  .aw .navitem { color: var(--ink-dim); }
  .aw .seg { color: var(--ink-dim); }
  .aw .seg[data-active="true"] { color: var(--accent); }
  .aw .tab { color: var(--ink-dim); }
  .aw .tab[data-active="true"] { color: var(--ink); font-weight:500; background: color-mix(in srgb, var(--accent) 9%, transparent); box-shadow: inset 2px 0 0 var(--accent); }
  .aw .sdot { background: var(--ink-faint); }
  .aw .sdot[data-run="true"] { background: var(--accent); }
  .aw .tab[data-active="true"] .sdot { box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent); }
  .aw .tabclose { color: var(--ink-faint); }
  .aw .cmpl { color: var(--ink-dim); }
  .aw .cmpl[data-active="true"] { background: color-mix(in srgb, var(--accent) 12%, transparent); color: var(--ink); }
  .aw .cmpl [data-hit="true"] { color: var(--accent); font-weight:600; }

  /* page chrome */
  .phead { max-width:1000px; margin:0 auto 8px; display:flex; align-items:flex-start; justify-content:space-between; gap:32px; }
  .phead .name { font-size:30px; letter-spacing:0.04em; color:var(--ink); }
  .phead .sub { margin-top:12px; font-size:14px; color:var(--ink-dim); line-height:1.8; max-width:620px; }
  .toggle { display:flex; align-items:center; gap:10px; font-size:12px; flex:none; padding-top:6px; }
  .toggle .seg { cursor:pointer; color:var(--ink-dim); transition:color .15s ease; }
  .toggle .seg:hover { color:var(--ink); }
  .toggle .seg[data-active="true"] { color:var(--accent); }
  .toggle .sep { color:var(--ink-faint); }
  .toggle .kbd { color:var(--ink-faint); margin-left:6px; font-size:11px; }
  #gallery { max-width:1000px; margin:0 auto; display:flex; flex-direction:column; gap:64px; padding-top:52px; }
  .eyebrow { display:flex; align-items:baseline; gap:14px; margin-bottom:20px; }
  .eyebrow .num { font-size:12px; color:var(--accent); letter-spacing:0.1em; }
  .eyebrow .ttl { font-size:15px; color:var(--ink); }
  .eyebrow .dsc { font-size:13px; color:var(--ink-dim); }
</style>
</head>
<body>
<div id="page" data-theme="dark">
  <div class="phead">
    <div>
      <div class="name">aterm</div>
      <div class="sub">Static, runtime-free snapshot of the vision mock - the UI north star (ADR-0011). Eight states of the app, both themes. Toggle the theme; the frames are static captures, not interactive.</div>
    </div>
    <div class="toggle">
      <span class="seg js-light" data-active="false" onclick="setTheme('light')">Light</span>
      <span class="sep">/</span>
      <span class="seg js-dark" data-active="true" onclick="setTheme('dark')">Dark</span>
      <span class="kbd">&#8984;L</span>
    </div>
  </div>
  <div id="gallery"></div>
</div>

<script>
"use strict";

var SESSIONS = [
  { name: "main", running: true, active: true },
  { name: "dev server", running: true, active: false },
  { name: "db shell", running: false, active: false }
];

// ---- per-state main content (resolved from AtermWindow.dc.html) ----

var LAUNCH = '' +
  '<div style="min-height:400px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:18px;">' +
    '<div style="font-size:22px; letter-spacing:0.04em; color:var(--ink);">aterm</div>' +
    '<div style="font-size:13.5px; color:var(--ink-dim); line-height:1.9; max-width:400px;">A quiet place to run things.<br/>Type a command below, or press &#8984;I to ask the agent instead.</div>' +
    '<div style="margin-top:6px; font-size:11.5px; color:var(--ink-faint); letter-spacing:0.06em;">no history yet</div>' +
  '</div>';

function block(glyph, glyphColor, cmd, meta, output) {
  return '<div class="block" style="padding:18px 0; border-top:1px solid var(--hairline);">' +
    '<div style="display:flex; gap:13px; align-items:baseline;">' +
      '<span style="color:' + glyphColor + '; font-weight:600;">' + glyph + '</span>' +
      '<span style="color:var(--ink);">' + cmd + '</span>' + meta +
    '</div>' +
    (output ? '<div style="padding-left:29px; margin-top:9px; color:var(--ink-dim); white-space:pre-wrap; line-height:1.75;">' + output + '</div>' : '') +
  '</div>';
}
function metaDot(color, text) {
  return '<span class="block-meta" style="margin-left:auto; display:flex; align-items:center; gap:9px; color:var(--ink-faint); font-size:0.82em;">' +
    '<span style="width:6px; height:6px; border-radius:50%; background:' + color + ';"></span>' + text + '</span>';
}

var SHELL = '<div>' +
  block("&#10095;", "var(--accent)", "git status", metaDot("var(--ink-faint)", "0.06s"),
    "On branch main\nYour branch is up to date with 'origin/main'.\n\nnothing to commit, working tree clean") +
  block("&#10095;", "var(--accent)", "ls", metaDot("var(--ink-faint)", "0.01s"),
    "Cargo.toml   README.md   src/   tests/   target/") +
  block("&#10095;", "var(--accent)", "cargo build --release", metaDot("var(--ok)", "12.71s"),
    "   Compiling aterm v0.4.0 (/Users/you/projects/aterm)\n    Finished release [optimized] target(s) in 12.71s") +
  block("&#10095;", "var(--accent)", "cargo test render::blocks", metaDot("var(--err)", "exit 1 &middot; 2.34s"),
    'running 3 tests\ntest render::blocks::wraps_long_lines ... ok\ntest render::blocks::hairline_between ... <span style="color:var(--err);">FAILED</span>\ntest render::blocks::block_metadata ... ok\n\ntest result: <span style="color:var(--err);">FAILED</span>. 2 passed; 1 failed; finished in 2.34s') +
  block("&#10095;", "var(--accent)", "git log --oneline -3", metaDot("var(--ink-faint)", "0.02s"),
    '<span style="color:var(--ink-faint);">a1c4f0e</span>  paint blocks from the first byte\n<span style="color:var(--ink-faint);">9d2b118</span>  warm near-black and paper themes\n<span style="color:var(--ink-faint);">3e77aa2</span>  route Enter by the mode chip') +
  '</div>';

var MODES = '<div style="min-height:400px; display:flex; flex-direction:column; justify-content:center; gap:26px;">' +
  '<div style="font-size:12px; letter-spacing:0.12em; text-transform:uppercase; color:var(--ink-faint);">One input, two destinations</div>' +
  '<div style="font-size:14.5px; color:var(--ink-dim); line-height:1.9; max-width:520px;">The box at the bottom drives the shell or the agent. The <span style="color:var(--ink);">mode chip</span> decides where <span style="color:var(--ink);">Enter</span> goes - press <span style="color:var(--accent);">&#8984;I</span> (or tap the chip) to flip it. Whatever you\'ve typed stays exactly where it is.</div>' +
  '<div style="display:flex; gap:34px; margin-top:4px;">' +
    '<div style="flex:1;"><div style="display:flex; align-items:center; gap:10px; margin-bottom:12px;"><span style="color:var(--accent);">&#10095;</span><span style="font-size:12.5px; color:var(--ink-dim);">Shell</span></div><div style="font-size:12.5px; color:var(--ink-faint); line-height:1.8;">Enter hands the line to the background shell and appends a command block to the timeline.</div></div>' +
    '<div style="width:1px; background:var(--hairline);"></div>' +
    '<div style="flex:1;"><div style="display:flex; align-items:center; gap:10px; margin-bottom:12px;"><span style="color:var(--agent);">&#9671;</span><span style="font-size:12.5px; color:var(--ink-dim);">Agent</span></div><div style="font-size:12.5px; color:var(--ink-faint); line-height:1.8;">Enter starts a client-side agentic loop that plans, calls tools, and reports back as blocks.</div></div>' +
  '</div>' +
  '<div style="font-size:12px; color:var(--ink-faint);">Currently routing to <span style="color:var(--accent);">Shell</span> - try flipping it below.</div>' +
  '</div>';

function toolRow(name, arg, extra) {
  return '<div style="display:flex; gap:11px; align-items:baseline;"><span style="color:var(--accent); opacity:0.9;">' + name + '</span><span style="color:var(--ink-faint);">' + arg + '</span>' + (extra || '') + '</div>';
}
function toolOut(body) {
  return '<div style="margin-top:7px; margin-bottom:16px; color:var(--ink-faint); white-space:pre-wrap; line-height:1.7; border-left:1px solid var(--hairline); padding-left:15px;">' + body + '</div>';
}

var AGENT = '<div>' +
  '<div class="block" style="padding:18px 0; border-top:1px solid var(--hairline);"><div style="display:flex; gap:13px; align-items:baseline;">' +
    '<span style="color:var(--agent); font-weight:600;">&#9671;</span><span style="color:var(--ink);">fix the failing block-render test</span>' +
    '<span class="block-meta" style="margin-left:auto; color:var(--ink-faint); font-size:0.82em;">agent &middot; 4 steps</span></div></div>' +
  '<div style="padding:6px 0 10px 29px; color:var(--ink-dim); line-height:1.85; font-size:0.95em;">' +
    '<div style="color:var(--ink-faint); font-size:0.86em; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:8px;">plan</div>' +
    'Read the failing test, reproduce it, then trace the hairline logic in the block renderer and patch it. Re-run the suite to confirm.</div>' +
  '<div style="padding-left:29px; margin-top:6px;">' +
    toolRow("read_file", "src/render/blocks.rs") +
    toolOut("fn draw(&amp;self, blocks: &amp;[Block]) {\n    for (i, b) in blocks.iter().enumerate() {\n        self.hairline(b.top);   // drawn for every block\n        b.paint(&amp;mut self.buf);\n    }\n}") +
    toolRow("run_command", "cargo test render::blocks::hairline_between") +
    toolOut('assertion failed: expected 0 hairlines above the first block, found 1\ntest result: <span style="color:var(--err);">FAILED</span>. 0 passed; 1 failed') +
    '<div style="margin-bottom:16px; color:var(--ink-dim); line-height:1.85; font-size:0.95em;">The hairline is painted above every block including the first. It should be skipped for <span style="color:var(--ink);">i == 0</span>.</div>' +
    toolRow("edit_file", "src/render/blocks.rs", '<span style="margin-left:auto; color:var(--ink-faint); font-size:0.86em;">+1 &#8722;1</span>') +
    '<div style="margin-top:7px; margin-bottom:16px; white-space:pre-wrap; line-height:1.7; border-left:1px solid var(--hairline); padding-left:15px;"><span style="color:var(--err);">-        self.hairline(b.top);</span>\n<span style="color:var(--ok);">+        if i &gt; 0 { self.hairline(b.top); }</span></div>' +
    toolRow("run_command", "cargo test render::blocks") +
    '<div style="margin-top:7px; margin-bottom:10px; color:var(--ink-faint); white-space:pre-wrap; line-height:1.7; border-left:1px solid var(--hairline); padding-left:15px;">test result: <span style="color:var(--ok);">ok</span>. 3 passed; 0 failed; finished in 2.29s</div>' +
  '</div>' +
  '<div style="padding:14px 0 6px 29px; border-top:1px solid var(--hairline); color:var(--ink); line-height:1.85;">Fixed. The hairline was being drawn above the first block; I guarded it with <span style="color:var(--ink-dim);">i &gt; 0</span>. All three tests pass.</div>' +
  '</div>';

var GATE = '<div>' +
  '<div class="block" style="padding:18px 0; border-top:1px solid var(--hairline);"><div style="display:flex; gap:13px; align-items:baseline;"><span style="color:var(--agent); font-weight:600;">&#9671;</span><span style="color:var(--ink);">free up disk space in this repo</span></div></div>' +
  '<div style="padding:2px 0 12px 29px; color:var(--ink-dim); line-height:1.85; font-size:0.95em;">The <span style="color:var(--ink);">target/</span> directory is 380&nbsp;MB of build artifacts. Removing it recovers the space; it rebuilds on next compile.</div>' +
  '<div style="padding-left:29px;">' +
    '<div style="display:flex; gap:11px; align-items:baseline; margin-bottom:14px;"><span style="color:var(--accent); opacity:0.9;">run_command</span><span style="color:var(--ink);">rm -rf ./target</span></div>' +
    '<div style="border:1px solid var(--warn); background:var(--warn-bg); border-radius:9px; padding:18px 20px;">' +
      '<div style="display:flex; gap:12px; align-items:baseline;"><span style="color:var(--warn);">&#9651;</span><div style="flex:1;"><div style="color:var(--ink); margin-bottom:6px;">Destructive command - needs your approval</div><div style="color:var(--ink-dim); font-size:0.92em; line-height:1.8;">This permanently deletes files and can\'t be undone. Safe commands run on their own; this one is gated.</div></div></div>' +
      '<div style="display:flex; align-items:center; gap:12px; margin-top:18px; padding-left:24px;">' +
        '<div style="display:flex;">' +
          '<button style="border:1px solid var(--accent); background:var(--accent); color:#fff; border-radius:7px 0 0 7px; padding:8px 16px; font-size:12.5px;">Approve</button>' +
          '<button style="border:1px solid var(--accent); border-left:1px solid rgba(255,255,255,0.3); background:var(--accent); color:#fff; border-radius:0 7px 7px 0; padding:8px 9px; font-size:10px; display:flex; align-items:center;">&#9662;</button>' +
        '</div>' +
        '<button style="border:1px solid var(--hairline); background:transparent; color:var(--ink-dim); border-radius:7px; padding:8px 18px; font-size:12.5px;">Reject</button>' +
        '<span style="margin-left:6px; color:var(--ink-faint); font-size:11.5px;">&#9166; approve &middot; esc reject</span>' +
      '</div>' +
    '</div>' +
  '</div>' +
  '</div>';

var COMPLETE = '<div style="min-height:360px; display:flex; flex-direction:column; justify-content:flex-end; gap:22px; padding-bottom:6px;">' +
  '<div style="font-size:12px; letter-spacing:0.12em; text-transform:uppercase; color:var(--ink-faint);">Tab completion</div>' +
  '<div style="font-size:14px; color:var(--ink-dim); line-height:1.95; max-width:530px;">A built-in fuzzy finder that hugs the prompt. Press <span style="color:var(--ink);">Tab</span> to open it - matched letters are highlighted in <span style="color:var(--accent);">accent</span>, and the list narrows as you type more of the command.</div>' +
  '</div>';

function cmpl(active, rest, desc) {
  return '<div class="cmpl" data-active="' + (active ? 'true' : 'false') + '" style="display:flex; align-items:baseline; gap:9px; padding:3px 10px; border-radius:6px;">' +
    '<span style="width:11px; flex:none; color:var(--accent); font-weight:600;">' + (active ? '&#8250;' : '&nbsp;') + '</span>' +
    '<span><span data-hit="true" style="white-space:pre;">git</span><span style="white-space:pre;">' + rest + '</span></span>' +
    '<span style="color:var(--ink-faint); font-size:0.8em; margin-left:2px;">' + desc + '</span></div>';
}
var COMPLETE_POP = '<div style="position:absolute; left:14px; bottom:calc(100% + 6px); z-index:20; background:var(--bg-elev); border:1px solid var(--hairline); border-radius:9px; box-shadow:0 12px 34px -16px rgba(0,0,0,0.6); padding:6px 6px 7px; font-size:13px; line-height:1.58;">' +
  '<div style="color:var(--ink-faint); font-size:11px; padding:2px 9px 6px; letter-spacing:0.02em;">6/12 &nbsp;&middot;&nbsp; tab &#9166; accept &nbsp;&middot;&nbsp; &#8593;&#8595; move &nbsp;&middot;&nbsp; esc</div>' +
  cmpl(true, " status", "working tree") +
  cmpl(false, " switch -c ", "new branch") +
  cmpl(false, ' commit -m ""', "record") +
  cmpl(false, " push --force-with-lease", "safe force") +
  cmpl(false, " log --oneline -10", "history") +
  cmpl(false, " stash pop", "restore") +
  '</div>';

function segRow(label, desc, controls) {
  return '<div style="display:flex; align-items:center; padding:20px 0; border-top:1px solid var(--hairline);">' +
    '<div style="flex:1;"><div style="color:var(--ink);">' + label + '</div><div style="color:var(--ink-faint); font-size:12px; margin-top:4px;">' + desc + '</div></div>' +
    '<div style="display:flex; gap:18px; align-items:center; font-size:13px;">' + controls + '</div></div>';
}
var SETTINGS = '<div style="display:flex; flex-direction:column; gap:2px;">' +
  '<div style="font-size:12px; letter-spacing:0.12em; text-transform:uppercase; color:var(--ink-faint); padding-bottom:22px;">Preferences</div>' +
  segRow("Theme", "Warm paper, or warm near-black.",
    '<span class="seg js-set-dark">Dark</span><span class="seg js-set-light">Light</span>') +
  segRow("Font size", "Applies across every block.",
    '<button style="border:1px solid var(--hairline); background:transparent; color:var(--ink-dim); border-radius:6px; width:28px; height:28px; font-size:15px;">&#8722;</button><span style="color:var(--ink); min-width:44px; text-align:center;">14 px</span><button style="border:1px solid var(--hairline); background:transparent; color:var(--ink-dim); border-radius:6px; width:28px; height:28px; font-size:15px;">+</button>') +
  segRow("Default provider", "Model backing the agent loop.",
    '<span class="seg" data-active="true">Anthropic</span><span class="seg">OpenAI</span><span class="seg">Local</span>') +
  '<div style="display:flex; align-items:center; padding:20px 0; border-top:1px solid var(--hairline); border-bottom:1px solid var(--hairline);"><div style="flex:1;"><div style="color:var(--ink);">Autonomy</div><div style="color:var(--ink-faint); font-size:12px; margin-top:4px;">When the agent may act without asking.</div></div><div style="display:flex; gap:18px; font-size:13px;"><span class="seg">Ask each time</span><span class="seg" data-active="true">Auto-run safe</span><span class="seg">Full auto</span></div></div>' +
  '<div style="padding-top:26px; color:var(--ink-faint); font-size:11.5px;">aterm 0.4.0 &middot; themes stay calm, config stays typographic</div>' +
  '</div>';

var EDITOR_TEXT = "# Release notes - v0.4.0\n\nBlocks now paint from the first byte, so output appears as it streams in - not after the command exits.\n\n- warm near-black and warm paper themes\n- Enter routes by the mode chip\n- a risk gate for destructive commands\n\nStill to do: fold long outputs, and a jump-to-block palette.\n";
var EDITOR = '<div style="display:flex; flex-direction:column; min-height:430px;">' +
  '<div style="display:flex; align-items:center; justify-content:space-between; padding-bottom:16px; border-bottom:1px solid var(--hairline);">' +
    '<span style="font-size:12.5px; color:var(--ink-dim);"><span style="color:var(--ink);">NOTES.md</span> &nbsp;&middot;&nbsp; edited</span>' +
    '<span style="font-size:11.5px; color:var(--ink-faint);">markdown &middot; 56 words &middot; &#8984;S save &middot; esc to shell</span>' +
  '</div>' +
  '<textarea spellcheck="false" style="flex:1; width:100%; max-width:620px; margin:22px auto 0; background:transparent; border:none; outline:none; resize:none; color:var(--ink); font-size:16px; line-height:1.9; caret-color:var(--accent); padding:0; min-height:320px;">' + EDITOR_TEXT + '</textarea>' +
  '</div>';

// ---- states ----
var STATES = [
  { num:"01", ttl:"Launch state",           dsc:"- a fresh window; quiet, inviting, no history yet.",                         mode:"shell", input:{text:"", ph:"Type a command…"}, main:LAUNCH },
  { num:"02", ttl:"Shell session",          dsc:"- every command and its output is a block; exit status reads at a glance.",  mode:"shell", input:{text:"", ph:"Type a command…"}, main:SHELL },
  { num:"03", ttl:"Unified input · modes", dsc:"- one box routes to shell or agent; the chip flips Enter, text preserved.", mode:"shell", input:{text:"check the build status and open a PR", ph:"Type a command…"}, main:MODES },
  { num:"04", ttl:"Agent session",          dsc:"- the agent plans, calls tools, observes, and reports back as blocks.",       mode:"agent", input:{text:"", ph:"Ask the agent to do something…"}, main:AGENT },
  { num:"05", ttl:"Risk gate",              dsc:"- safe commands run silently; destructive ones pause for approval.",          mode:"shell", input:{text:"", ph:"Type a command…"}, main:GATE },
  { num:"07", ttl:"Tab completion",         dsc:"- a built-in fuzzy finder; matched letters highlighted, the list narrows.",   mode:"shell", input:{text:"git", ph:"Type a command…"}, pop:COMPLETE_POP, main:COMPLETE },
  { num:"06", ttl:"Settings",               dsc:"- even configuration stays calm and typographic.",                            noInput:true, main:SETTINGS },
  { num:"08", ttl:"Editor mode",            dsc:"- open a file into a calm, centered writing surface; the terminal folds away.", noInput:true, main:EDITOR }
];

// ---- window template ----
function sidebar() {
  var rows = SESSIONS.map(function (s) {
    return '<div class="tab" data-active="' + (s.active ? 'true' : 'false') + '" style="padding:7px 22px; display:flex; align-items:center; gap:11px; font-size:12.5px;">' +
      '<span class="sdot" data-run="' + (s.running ? 'true' : 'false') + '" style="width:6px; height:6px; border-radius:50%; flex:none;"></span>' +
      '<span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">' + s.name + '</span>' +
      '<span class="tabclose" style="font-size:11px; flex:none; opacity:0;">&#10005;</span></div>';
  }).join("");
  return '<div style="width:210px; flex:none; border-right:1px solid var(--hairline); padding:20px 0; display:flex; flex-direction:column;">' +
    '<div style="padding:0 22px 8px; display:flex; align-items:center; justify-content:space-between;"><span style="font-size:10.5px; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-faint);">Sessions</span><span class="navitem" style="font-size:15px; line-height:1; color:var(--ink-faint);">+</span></div>' +
    rows +
    '<div style="margin-top:auto; padding:16px 22px 0; font-size:10.5px; color:var(--ink-faint); line-height:1.7;"><div>&#8984;T &nbsp;new session</div><div>&#8984;I &nbsp;switch mode</div><div>&#8984;L &nbsp;switch theme</div></div>' +
    '</div>';
}
function inputBar(st) {
  var glyph = st.mode === "agent" ? "&#9671;" : "&#10095;";
  var label = st.mode === "agent" ? "Agent" : "Shell";
  return '<div style="flex:none; border-top:1px solid var(--hairline); position:relative;">' +
    (st.pop || '') +
    '<div data-mode="' + st.mode + '" style="padding:14px 22px; display:flex; align-items:flex-start; gap:14px;">' +
      '<span style="color:var(--mode); font-weight:600; font-size:15px; line-height:1.6; padding-top:1px;">' + glyph + '</span>' +
      '<div style="flex:1; color:' + (st.input.text ? 'var(--ink)' : 'var(--ink-faint)') + '; font-size:14px; line-height:1.6; min-height:22px;">' + (st.input.text || st.input.ph) + '<span style="display:inline-block; width:2px; height:1.05em; background:var(--mode); vertical-align:text-bottom; margin-left:1px;"></span></div>' +
      '<button style="align-self:flex-start; margin-top:1px; border:1px solid var(--mode); background:color-mix(in srgb, var(--mode) 13%, transparent); color:var(--mode); border-radius:20px; padding:5px 12px; font-size:11.5px; display:flex; align-items:center; gap:8px;"><span style="font-weight:600; font-size:12.5px;">' + glyph + '</span>' + label + '<span style="opacity:0.55; margin-left:1px;">&#8984;I</span></button>' +
    '</div>' +
    '</div>';
}
function windowFor(st) {
  var title = SESSIONS.filter(function (s) { return s.active; })[0].name;
  return '<div class="aw" data-theme="dark" style="width:100%; background:var(--bg); border:1px solid var(--hairline); border-radius:12px; overflow:hidden; display:flex; flex-direction:column; box-shadow:0 24px 60px -34px rgba(0,0,0,0.4);">' +
    '<div style="height:44px; flex:none; display:flex; align-items:center; padding:0 15px; border-bottom:1px solid var(--hairline); position:relative;">' +
      '<div style="display:flex; gap:9px; align-items:center;"><span style="width:12px; height:12px; border-radius:50%; background:#e0655a;"></span><span style="width:12px; height:12px; border-radius:50%; background:#dfa63f;"></span><span style="width:12px; height:12px; border-radius:50%; background:#7cae5b;"></span></div>' +
      '<span class="navitem" style="margin-left:18px; font-size:15px; line-height:1; color:var(--ink-faint);">&#9703;</span>' +
      '<div style="position:absolute; left:0; right:0; text-align:center; pointer-events:none; font-size:12.5px; letter-spacing:0.02em; color:var(--ink-dim);"><span style="color:var(--ink);">' + title + '</span><span style="color:var(--ink-faint);"> &nbsp;-&nbsp; ~/projects/aterm</span></div>' +
    '</div>' +
    '<div style="flex:1; display:flex; min-height:0;">' +
      sidebar() +
      '<div style="flex:1; min-width:0; display:flex; flex-direction:column;">' +
        '<div style="flex:1; overflow-y:auto;"><div style="margin:0; padding:30px 22px 24px;">' + st.main + '</div></div>' +
        (st.noInput ? '' : inputBar(st)) +
      '</div>' +
    '</div>' +
  '</div>';
}

// ---- render ----
var gallery = document.getElementById("gallery");
gallery.innerHTML = STATES.map(function (st) {
  return '<section>' +
    '<div class="eyebrow"><span class="num">' + st.num + '</span><span class="ttl">' + st.ttl + '</span><span class="dsc">' + st.dsc + '</span></div>' +
    windowFor(st) +
  '</section>';
}).join("");

// ---- theme toggle ----
function setTheme(t) {
  document.querySelectorAll('[data-theme]').forEach(function (e) { e.setAttribute('data-theme', t); });
  var setActive = function (sel, on) { document.querySelectorAll(sel).forEach(function (e) { e.setAttribute('data-active', on ? 'true' : 'false'); }); };
  setActive('.js-dark', t === 'dark'); setActive('.js-light', t === 'light');
  // reflect in the Settings screen theme segment
  setActive('.js-set-dark', t === 'dark'); setActive('.js-set-light', t === 'light');
}
window.addEventListener('keydown', function (e) {
  if ((e.metaKey || e.ctrlKey) && (e.key === 'l' || e.key === 'L')) {
    e.preventDefault();
    var cur = document.getElementById('page').getAttribute('data-theme');
    setTheme(cur === 'dark' ? 'light' : 'dark');
  }
});
setTheme('dark');
</script>
</body>
</html>
