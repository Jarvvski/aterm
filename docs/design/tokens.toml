# aterm design tokens — machine-readable mirror of docs/design/design-system.md
#
# The aterm-tokens crate reifies this file as typed Rust constants (leaf crate,
# no internal deps). Values here MUST stay identical to design-system.md; that
# doc owns intent, this file owns values.
#
# Palette source of record: the vision mock adopted as the UI north star in
# ADR-0011 (docs/design/vision-mock/AtermWindow.dc.html). Two themes ship day one:
# a warm "paper" light and a warm near-black dark, one hue family so ANSI output
# and UI never clash. Two mode accents (shell blue + agent purple), an elevated
# surface (bg_elev) for popovers/menus, and surface tints (hairline, selection,
# weak fills) - defined as alpha over the canvas in the mock, stored here
# pre-composited to opaque (they only ever sit on canvas).
#
# The prior "OWNER CONFIRMATION REQUIRED / derived accent" note is resolved by
# ADR-0011: the accent is the mock's blue by owner decision. All contrast ratios
# below are recomputed against the new hexes by aterm-tokens' wcag_* tests; the
# one intentional sub-AA tone (fg_muted) is annotated inline.

schema_version = 1

# ---------------------------------------------------------------------------
# Fonts. Mono NFM for the grid (constant advance, mandatory). Duo/Quattro are
# proportional and are NOT yet vendored (prior prototype shipped Mono only);
# until added, prose/ui fall back to the platform proportional UI face.
# ---------------------------------------------------------------------------
[font]
grid  = "iM Writing Mono Nerd Font Mono"   # terminal grid: input echo, output, code, diffs
prose = "iM Writing Duo"                    # agent prose / transcript body
ui    = "iM Writing Quattro"                # dense chrome: status strip, chips, palette
fallback_proportional = "system-ui"         # used until Duo/Quattro are bundled
weight_regular  = 400
weight_medium   = 500
weight_semibold = 600
weight_bold     = 700

# ---------------------------------------------------------------------------
# Type scale. size_pt = logical points (renderer scales by backing factor).
# line_height = unitless multiplier. measure_ch caps prose width (grid uncapped).
# ---------------------------------------------------------------------------
[type]
measure_ch = 72   # iA middle line-length option (64/72/80); prose only, never the grid

[type.grid]
size_pt = 13.0
line_height = 1.30
font = "grid"

[type.body]
size_pt = 14.0
line_height = 1.50
font = "prose"

[type.heading]
size_pt = 16.0
line_height = 1.35
font = "prose"
weight = 500

[type.label]
size_pt = 11.0
line_height = 1.30
font = "ui"

[type.caption]
size_pt = 10.5
line_height = 1.30
font = "ui"

# ---------------------------------------------------------------------------
# Semantic colors — light "paper". sRGB hex. Tints (hairline/selection/*_weak)
# are the mock's alpha-over-canvas values pre-composited to opaque. Mock source:
# .aw[data-theme="light"] custom properties.
# ---------------------------------------------------------------------------
[color.light]
bg_canvas           = "#FAF7EF"     # --bg
bg_surface          = "#F2EDE1"     # = bg_elev (the mock's single raise)
bg_surface_alt      = "#E9E2D1"     # derived further raise (hover rows / output)
bg_elev             = "#F2EDE1"     # --bg-elev: popovers, gate menu, completion
fg_primary          = "#26231B"     # --ink       (14.65:1 on canvas, AAA)
fg_secondary        = "#6C6555"     # --ink-dim   (5.40:1, AA body)
fg_muted            = "#A89F8C"     # --ink-faint (2.45:1 — faint meta; sub-AA, see doc)
fg_faint            = "#BCB4A3"     # derived fainter step (disabled)
accent_primary      = "#2F7DC2"     # --accent    (4.06:1, AA large/UI)
accent_agent        = "#7458BD"     # --agent     (5.06:1, AA large/UI)
accent_primary_text = "#2B73B4"     # darker accent for small text (4.65:1, AA body)
accent_primary_weak = "#E2E8EA"     # accent @ 12% over canvas (chip/target fill)
hairline            = "#E5E2DA"     # ink @ 10% over canvas (--hairline)
hairline_strong     = "#D4D1C9"     # ink @ 18% (section dividers)
selection_bg        = "#C5D7E3"     # accent @ 26% over canvas
success             = "#5C8A56"     # --ok
caution             = "#B57D2C"     # --warn
caution_weak        = "#F4EDDF"     # warn @ 8% over canvas (--warn-bg): gate card fill
danger              = "#BF5A40"     # --err
info                = "#2F7DC2"     # = accent_primary

# ---------------------------------------------------------------------------
# Semantic colors — dark. Mock source: .aw[data-theme="dark"] custom properties.
# ---------------------------------------------------------------------------
[color.dark]
bg_canvas           = "#1B1915"     # --bg
bg_surface          = "#221F19"     # = bg_elev (the mock's single raise)
bg_surface_alt      = "#2B2820"     # derived further raise (hover rows / output)
bg_elev             = "#221F19"     # --bg-elev: popovers, gate menu, completion
fg_primary          = "#ECE6D8"     # --ink       (14.11:1 on canvas, AAA)
fg_secondary        = "#9A9382"     # --ink-dim   (5.74:1, AA body)
fg_muted            = "#5E584B"     # --ink-faint (2.49:1 — faint meta; sub-AA, see doc)
fg_faint            = "#4A453B"     # derived fainter step (disabled)
accent_primary      = "#3D88CC"     # --accent    (4.67:1, AA body)
accent_agent        = "#9D86D6"     # --agent     (5.70:1, AA body)
accent_primary_text = "#3D88CC"     # = accent_primary (4.67:1, AA body)
accent_primary_weak = "#1F262B"     # accent @ 12% over canvas (chip/target fill)
hairline            = "#2D2A26"     # ink @ 8.5% over canvas (--hairline)
hairline_strong     = "#3C3A34"     # ink @ 16% (section dividers)
selection_bg        = "#243645"     # accent @ 26% over canvas
success             = "#82AC79"     # --ok
caution             = "#D59A4A"     # --warn
caution_weak        = "#2C251A"     # warn @ 9% over canvas (--warn-bg): gate card fill
danger              = "#D47257"     # --err
info                = "#3D88CC"     # = accent_primary

# ---------------------------------------------------------------------------
# ANSI 16-color palette — light "paper". Index 0..15. Warm family (T-4.2
# structure; hues warmed to match the mock). On light bg, index 7/15 are dark
# foregrounds, index 0 is darkest. Light brights (cyan/yellow/green) sit sub-3:1
# by design — the renderer's light legibility remap lifts them. Eyeball vs real
# output (ls --color, vim, htop, git diff) is deferred to EPIC-7's shell-matrix.
# ---------------------------------------------------------------------------
[ansi.light]
black          = "#26231B"
red            = "#B0502F"
green          = "#4E7D48"
yellow         = "#9C6A22"
blue           = "#2C6EA9"
magenta        = "#63499F"
cyan           = "#2F7D74"
white          = "#6C6555"
bright_black   = "#A89F8C"
bright_red     = "#C96A44"
bright_green   = "#77A56A"
bright_yellow  = "#DCB45A"
bright_blue    = "#3D88CC"
bright_magenta = "#8F74CF"
bright_cyan    = "#57C3B6"
bright_white   = "#26231B"

# ---------------------------------------------------------------------------
# ANSI 16-color palette — dark. Index 0..15. Warm family; every entry is
# comfortably legible on the warm near-black canvas, brights are the lighter
# siblings. Eyeball vs real output is deferred to EPIC-7's shell-matrix.
# ---------------------------------------------------------------------------
[ansi.dark]
black          = "#1B1915"
red            = "#D06E54"
green          = "#85B078"
yellow         = "#D2A15A"
blue           = "#4D8FCA"
magenta        = "#A98FD6"
cyan           = "#6BB0A6"
white          = "#CFC8B8"
bright_black   = "#5E584B"
bright_red     = "#E08A70"
bright_green   = "#9CC590"
bright_yellow  = "#E6B56A"
bright_blue    = "#6BA6DD"
bright_magenta = "#BBA6E6"
bright_cyan    = "#8FC9BF"
bright_white   = "#ECE6D8"

# ---------------------------------------------------------------------------
# Spacing scale (px, 4px base) + radii. Borders are hairline (1px), never >=2px.
# ---------------------------------------------------------------------------
[space]
s0  = 0
s1  = 4    # inline gaps (chip padding)
s2  = 8    # label-to-value, icon-to-text
s3  = 12   # intra-block padding
s4  = 16   # block content padding / horizontal gutter
s6  = 24   # between blocks (vertical rhythm)
s8  = 32   # section breaks, agent-card outer margin
s12 = 48   # top/bottom canvas breathing room
radius_sm = 4   # chips, badges
radius_md = 6   # agent card
hairline_width = 1

# ---------------------------------------------------------------------------
# Motion. Durations in ms. <=3 animation kinds, all <=220ms, decelerate easing.
# Must never threaten the 60fps floor (120fps ProMotion).
# ---------------------------------------------------------------------------
[motion]
fast = 90    # gate badge cross-fade, routing-chip toggle
base = 140   # block insert (fade + 4px rise)
slow = 220   # focus-mode dim ramp
easing = "cubic-bezier(0.2, 0, 0, 1)"

# ---------------------------------------------------------------------------
# Caret. Default = thin bar tinted to the current mode accent (ADR-0011: shell ->
# accent_primary, agent -> accent_agent, via SemanticColors::mode_accent). Honor
# DECSCUSR block/underline in raw apps.
# ---------------------------------------------------------------------------
[caret]
default_style = "bar"          # bar | block | underline
bar_width_px = 2
color = "mode_accent"           # resolved per theme AND per input mode (shell/agent)
block_opacity = 0.70            # block caret fill; glyph drawn in bg_canvas (inverse)
blink_soft = true               # opacity ramp, not hard toggle
blink_suppress_while_typing = true
